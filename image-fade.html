<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Fade</title>

    <style>
        @font-face {
            font-family: "Inter";
            font-weight: 300 800;
            src: url('fonts/Inter-4.1/InterVariable.ttf');
        }

        * {
            box-sizing: border-box;
        }

        html {
            font-size: 18px;
        }

        body {
            background-color: #e2e2e2;
            display: grid;
            place-items: center;
            min-height: 100vh;
        }

        body,
        button {
            font-family: "Inter", sans-serif;
        }

        .container {
            background-color: #f4f2f3;
            border-radius: 2rem;
            padding: 2rem;
            position: relative;
        }

        .text {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
        }

        img {
            border-radius: 1.5rem;
            height: 300px;
            object-fit: cover;
            opacity: 1;
            position: relative;
            transition: opacity 0.15s ease-in-out;
            width: 100%;
        }

        img:hover {
            opacity: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="text">
            <h1>Hello</h1>

            <p>This is a test sentence.</p>
        </div>

        <img src="images/forest-river.avif" alt="Forest river">
    </div>
</body>

</html>
